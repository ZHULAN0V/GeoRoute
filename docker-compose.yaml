version: '3.8'

services:
  cert-gen:
    image: alpine:3.21
    container_name: cert-gen
    volumes:
      - certs-data:/etc/nginx/certs
    command: >
      sh -c "apk add --no-cache openssl && 
      if [ ! -f /etc/nginx/certs/nginx.key ]; then 
      openssl req -x509 -nodes -days 365 -newkey rsa:2048 
      -keyout /etc/nginx/certs/nginx.key 
      -out /etc/nginx/certs/nginx.crt 
      -subj '/C=US/ST=State/L=City/O=Organization/CN=localhost'; 
      fi"

  frontend:
    build: ./georoute-frontend
    container_name: georoute-frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certs-data:/etc/nginx/certs:ro
    depends_on:
      cert-gen:
          condition: service_completed_successfully
      backend:
        condition: service_started
      graphhopper:
        condition: service_started
    networks:
      - app-network

  backend:
    build: ./georoute-backend
    container_name: georoute-backend
    environment:
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - app-network

  graphhopper:
    image: israelhikingmap/graphhopper:11.0
    container_name: graphhopper
    volumes:
      - ./georoute-backend/src/main/resources/graphhopper/config.yml:/config.yml
      - ./georoute-backend/src/main/resources/graphhopper/maps/map.osm.pbf:/data/map.osm.pbf
    command: >
      --input /data/map.osm.pbf
      --host 0.0.0.0
      --config /config.yml
    networks:
      - app-network

  minio:
    image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: minio
    environment:
      MINIO_ROOT_USER: "minioadmin"
      MINIO_ROOT_PASSWORD: "minioadmin"
    command: ["server", "--console-address", ":9001", "/data"]
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  minio_data:
  certs-data:
